<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#F0EDF5"/>
  <!-- back hair - warm brown -->
  <rect x="9" y="3" width="14" height="5" fill="#B5654B"/>
  <rect x="7" y="4" width="3" height="3" fill="#B5654B"/>
  <rect x="22" y="4" width="3" height="3" fill="#B5654B"/>
  <!-- head -->
  <rect x="11" y="5" width="10" height="10" fill="#F5D5C8"/>
  <rect x="10" y="7" width="1" height="6" fill="#F5D5C8"/>
  <rect x="21" y="7" width="1" height="6" fill="#F5D5C8"/>
  <!-- front hair -->
  <rect x="10" y="3" width="12" height="4" fill="#D4846A"/>
  <rect x="9" y="4" width="2" height="3" fill="#D4846A"/>
  <rect x="21" y="4" width="2" height="3" fill="#D4846A"/>
  <!-- happy eyes - curved -->
  <rect x="12" y="9" width="3" height="2" fill="#3A3A4A"/>
  <rect x="17" y="9" width="3" height="2" fill="#3A3A4A"/>
  <rect x="12" y="10" width="1" height="1" fill="#FFF"/>
  <rect x="17" y="10" width="1" height="1" fill="#FFF"/>
  <!-- blush -->
  <rect x="10" y="12" width="2" height="1" fill="#E8B4B4"/>
  <rect x="20" y="12" width="2" height="1" fill="#E8B4B4"/>
  <!-- big smile -->
  <rect x="13" y="12" width="6" height="2" fill="#E8B4B4"/>
  <rect x="14" y="12" width="4" height="1" fill="#C48B7B"/>
  <!-- pink top -->
  <rect x="10" y="15" width="12" height="9" fill="#D4B4C7"/>
  <rect x="9" y="16" width="1" height="4" fill="#D4B4C7"/>
  <rect x="22" y="16" width="1" height="4" fill="#D4B4C7"/>
  <!-- neckline -->
  <rect x="14" y="15" width="4" height="2" fill="#F5F5F5"/>
  <!-- arms -->
  <rect x="6" y="17" width="4" height="2" fill="#F5D5C8"/>
  <rect x="22" y="17" width="4" height="2" fill="#F5D5C8"/>
  <!-- hands -->
  <rect x="6" y="19" width="3" height="2" fill="#F5D5C8"/>
  <rect x="23" y="19" width="3" height="2" fill="#F5D5C8"/>
  <!-- heart -->
  <rect x="3" y="14" width="1" height="1" fill="#E05A5A"/>
  <rect x="2" y="15" width="3" height="2" fill="#E05A5A"/>
  <rect x="2" y="13" width="3" height="1" fill="#E05A5A"/>
  <rect x="3" y="17" width="1" height="1" fill="#E05A5A"/>
  <!-- pants -->
  <rect x="11" y="24" width="4" height="5" fill="#4A4A5A"/>
  <rect x="17" y="24" width="4" height="5" fill="#4A4A5A"/>
  <!-- shoes -->
  <rect x="11" y="29" width="4" height="2" fill="#C47B6A"/>
  <rect x="17" y="29" width="4" height="2" fill="#C47B6A"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- bg -->
  <rect width="32" height="32" fill="#F0EDF5"/>
  <!-- back hair -->
  <rect x="9" y="3" width="14" height="6" fill="#4A3F5A"/>
  <rect x="7" y="5" width="3" height="4" fill="#4A3F5A"/>
  <rect x="22" y="5" width="3" height="4" fill="#4A3F5A"/>
  <!-- head -->
  <rect x="11" y="6" width="10" height="10" fill="#F5D5C8"/>
  <rect x="10" y="8" width="1" height="6" fill="#F5D5C8"/>
  <rect x="21" y="8" width="1" height="6" fill="#F5D5C8"/>
  <!-- front hair -->
  <rect x="11" y="4" width="10" height="4" fill="#5A4F6A"/>
  <rect x="10" y="5" width="2" height="3" fill="#5A4F6A"/>
  <rect x="20" y="5" width="2" height="3" fill="#5A4F6A"/>
  <rect x="12" y="7" width="2" height="2" fill="#5A4F6A"/>
  <rect x="18" y="7" width="2" height="2" fill="#5A4F6A"/>
  <!-- glasses frame -->
  <rect x="9" y="10" width="6" height="4" fill="#6B6B7B"/>
  <rect x="17" y="10" width="6" height="4" fill="#6B6B7B"/>
  <rect x="15" y="11" width="2" height="2" fill="#6B6B7B"/>
  <!-- eyes behind glasses -->
  <rect x="11" y="11" width="2" height="2" fill="#3A3A4A"/>
  <rect x="19" y="11" width="2" height="2" fill="#3A3A4A"/>
  <rect x="11" y="11" width="1" height="1" fill="#FFF"/>
  <rect x="19" y="11" width="1" height="1" fill="#FFF"/>
  <!-- blush -->
  <rect x="10" y="13" width="2" height="1" fill="#E8B4B4"/>
  <rect x="20" y="13" width="2" height="1" fill="#E8B4B4"/>
  <!-- mouth -->
  <rect x="15" y="14" width="2" height="1" fill="#C48B7B"/>
  <!-- body/cardigan -->
  <rect x="10" y="16" width="12" height="10" fill="#7B6B9B"/>
  <rect x="9" y="18" width="1" height="4" fill="#7B6B9B"/>
  <rect x="22" y="18" width="1" height="4" fill="#7B6B9B"/>
  <!-- shirt collar -->
  <rect x="13" y="16" width="2" height="2" fill="#F5F5F5"/>
  <rect x="17" y="16" width="2" height="2" fill="#F5F5F5"/>
  <!-- book -->
  <rect x="5" y="18" width="5" height="6" fill="#8BAB8B"/>
  <rect x="5" y="18" width="1" height="6" fill="#6B8B6B"/>
  <rect x="6" y="19" width="3" height="1" fill="#F5F5F5"/>
  <!-- hands -->
  <rect x="7" y="20" width="3" height="2" fill="#F5D5C8"/>
  <rect x="19" y="20" width="2" height="2" fill="#F5D5C8"/>
  <!-- pants -->
  <rect x="11" y="26" width="4" height="4" fill="#4A4A5A"/>
  <rect x="17" y="26" width="4" height="4" fill="#4A4A5A"/>
  <!-- shoes -->
  <rect x="11" y="30" width="4" height="2" fill="#5A5A6A"/>
  <rect x="17" y="30" width="4" height="2" fill="#5A5A6A"/>
</svg>

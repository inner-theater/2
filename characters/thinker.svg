<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#F0EDF5"/>
  <!-- hair -->
  <rect x="8" y="2" width="16" height="8" fill="#4A3F6B"/>
  <rect x="6" y="4" width="4" height="4" fill="#4A3F6B"/>
  <rect x="22" y="4" width="4" height="4" fill="#4A3F6B"/>
  <!-- face -->
  <rect x="12" y="6" width="8" height="10" fill="#F5D0C5"/>
  <!-- glasses -->
  <rect x="10" y="8" width="5" height="4" fill="none" stroke="#3A3550" stroke-width="1"/>
  <rect x="17" y="8" width="5" height="4" fill="none" stroke="#3A3550" stroke-width="1"/>
  <rect x="15" y="9" width="2" height="2" fill="#3A3550"/>
  <!-- mouth -->
  <rect x="14" y="14" width="4" height="1" fill="#C4958E"/>
  <!-- body -->
  <rect x="10" y="16" width="12" height="10" fill="#6B5B8E"/>
  <!-- arms -->
  <rect x="6" y="18" width="4" height="2" fill="#6B5B8E"/>
  <rect x="22" y="18" width="4" height="2" fill="#6B5B8E"/>
  <!-- book in hand -->
  <rect x="4" y="17" width="4" height="5" fill="#89A89B"/>
  <!-- legs -->
  <rect x="12" y="26" width="4" height="4" fill="#4A3F6B"/>
  <rect x="18" y="26" width="4" height="4" fill="#4A3F6B"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#F0EDF5"/>
  <!-- hat -->
  <rect x="10" y="1" width="12" height="5" fill="#8B7355"/>
  <rect x="8" y="3" width="4" height="4" fill="#8B7355"/>
  <!-- face -->
  <rect x="12" y="5" width="8" height="9" fill="#F5D0C5"/>
  <!-- eyes -->
  <rect x="13" y="8" width="2" height="2" fill="#3A3550"/>
  <rect x="17" y="8" width="2" height="2" fill="#3A3550"/>
  <!-- smile -->

  <!-- legs -->
  <rect x="12" y="23" width="4" height="5" fill="#6B7B6A"/>
  <rect x="17" y="23" width="4" height="5" fill="#6B7B6A"/>
  <!-- boots -->
  <rect x="11" y="28" width="6" height="2" fill="#5A6A5A"/>
  <rect x="16" y="28" width="6" height="2" fill="#5A6A5A"/>
